version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tripwise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tripwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tripwise}
      POSTGRES_DB: ${POSTGRES_DB:-tripwise}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tripwise}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripwise_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-tripwise}:${POSTGRES_PASSWORD:-tripwise}@postgres:5432/${POSTGRES_DB:-tripwise}
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    # command sera défini dans le Dockerfile du backend

volumes:
  postgres_data:

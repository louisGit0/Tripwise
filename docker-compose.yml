version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tripwise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tripwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tripwise}
      POSTGRES_DB: ${POSTGRES_DB:-tripwise}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tripwise}']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tripwise_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tripwise.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripwise_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-tripwise}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-tripwise}
      DB_NAME: ${POSTGRES_DB:-tripwise}
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules

volumes:
  postgres_data:
  pgadmin_data:
